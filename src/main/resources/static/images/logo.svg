<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40" width="160" height="40">
  <!-- Clipboard body -->
  <rect x="2" y="6" width="28" height="32" rx="3" ry="3" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <!-- Clipboard clip -->
  <rect x="9" y="3" width="14" height="6" rx="2" ry="2" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <!-- Check line 1 (checked) -->
  <polyline points="7,15 10,19 16,13" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="19" y1="16" x2="27" y2="16" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Check line 2 (checked) -->
  <polyline points="7,24 10,28 16,22" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="19" y1="25" x2="27" y2="25" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Check line 3 (unchecked) -->
  <rect x="7" y="31" width="6" height="6" rx="1" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="16" y1="34" x2="27" y2="34" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
  <!-- App name -->
  <text x="38" y="27" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" letter-spacing="0.5">MyTodo</text>
</svg>
